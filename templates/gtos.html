<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RadioBras Digital — Status de GTOs</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--green-900:#064E3B;--green-700:#047857;--green-600:#059669;--green-500:#10B981;--green-100:#D1FAE5;
--gray-900:#111827;--gray-700:#374151;--gray-600:#4B5563;--gray-500:#6B7280;--gray-400:#9CA3AF;--gray-300:#D1D5DB;--gray-200:#E5E7EB;--gray-100:#F3F4F6;--gray-50:#F9FAFB;--white:#fff;
--red-600:#DC2626;--red-500:#EF4444;--red-100:#FEE2E2;--yellow-500:#F59E0B;--yellow-100:#FEF3C7;--blue-500:#3B82F6;--blue-100:#DBEAFE;--purple-500:#8B5CF6;--purple-100:#EDE9FE;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans Pro',-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;}
.icon{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.icon-sm{width:16px;height:16px;}.icon-lg{width:24px;height:24px;}
.topnav{background:var(--green-900);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:fixed;top:0;left:0;right:0;z-index:100;}
.topnav-brand{display:flex;align-items:center;gap:12px;}
.topnav-logo{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--green-900);font-weight:700;font-size:14px;}
.topnav-title{color:#fff;font-size:18px;font-weight:600;}
.topnav-menu{display:flex;gap:8px;}
.topnav-link{color:rgba(255,255,255,.7);text-decoration:none;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;}
.topnav-link:hover,.topnav-link.active{background:rgba(255,255,255,.1);color:#fff;}
.topnav-right{display:flex;align-items:center;gap:16px;}
.topnav-avatar{width:36px;height:36px;background:var(--green-600);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;}
.main{padding:32px;max-width:1400px;margin-left:auto;margin-right:auto;}
.page-title{font-size:28px;font-weight:700;margin-bottom:4px;}
.page-subtitle{font-size:15px;color:var(--gray-500);margin-bottom:28px;}
.stats-row{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:28px;}
.stat-card{background:#fff;border-radius:12px;padding:18px;border:1px solid var(--gray-200);}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.green{background:var(--green-100);color:var(--green-700);}.blue{background:var(--blue-100);color:var(--blue-500);}.yellow{background:var(--yellow-100);color:var(--yellow-500);}.red{background:var(--red-100);color:var(--red-500);}.purple{background:var(--purple-100);color:var(--purple-500);}.gray{background:var(--gray-100);color:var(--gray-400);}
.stat-value{font-size:26px;font-weight:700;line-height:1;margin-bottom:2px;}.stat-label{font-size:12.5px;color:var(--gray-500);}
.content-grid{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}
.card{background:#fff;border-radius:12px;border:1px solid var(--gray-200);overflow:hidden;}
.card-header{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center;}
.card-title{font-size:16px;font-weight:600;}.card-title span{font-weight:400;color:var(--gray-400);font-size:14px;}
.funnel{padding:24px;}
.funnel-item{padding:10px 0;}
.funnel-label{display:flex;justify-content:space-between;margin-bottom:6px;}
.funnel-name{font-size:13px;font-weight:600;color:var(--gray-700);}.funnel-count{font-size:13px;font-weight:700;}
.funnel-bar{height:8px;border-radius:4px;background:var(--gray-100);overflow:hidden;}
.funnel-fill{height:100%;border-radius:4px;transition:width .5s;}
.fill-green{background:var(--green-500);}.fill-blue{background:var(--blue-500);}.fill-yellow{background:var(--yellow-500);}.fill-red{background:var(--red-500);}.fill-purple{background:var(--purple-500);}.fill-gray{background:var(--gray-400);}
.gto-item{display:flex;align-items:center;padding:13px 24px;border-bottom:1px solid var(--gray-100);}
.gto-item:last-child{border-bottom:none;}.gto-item:hover{background:var(--gray-50);}
.gto-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-right:13px;flex-shrink:0;}
.av-green{background:var(--green-100);color:var(--green-700);}.av-red{background:var(--red-100);color:var(--red-500);}.av-yellow{background:var(--yellow-100);color:var(--yellow-500);}.av-gray{background:var(--gray-100);color:var(--gray-400);}
.gto-info{flex:1;min-width:0;}
.gto-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gto-meta{font-size:12px;color:var(--gray-500);}
.status-pill{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap;margin-left:12px;}
.pill-green{background:var(--green-100);color:var(--green-700);}.pill-red{background:var(--red-100);color:var(--red-500);}.pill-yellow{background:var(--yellow-100);color:var(--yellow-500);}.pill-gray{background:var(--gray-100);color:var(--gray-500);}
.search{padding:9px 14px;border-radius:8px;border:1px solid var(--gray-300);font-size:13px;font-family:inherit;width:260px;outline:none;}
.search:focus{border-color:var(--green-500);}
.empty{padding:32px 24px;text-align:center;color:var(--gray-400);font-size:14px;}
@media(max-width:980px){.content-grid{grid-template-columns:1fr;}.stats-row{grid-template-columns:repeat(3,1fr);}.topnav-menu{display:none;}}
</style>
</head>
<body>
<svg style="display:none">
<symbol id="i-check" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></symbol>
<symbol id="i-send" viewBox="0 0 24 24"><path d="M12 19V5m0 0l-7 7m7-7l7 7"/></symbol>
<symbol id="i-doc" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></symbol>
<symbol id="i-warn" viewBox="0 0 24 24"><path d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></symbol>
<symbol id="i-x" viewBox="0 0 24 24"><path d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></symbol>
<symbol id="i-tooth" viewBox="0 0 24 24"><path d="M12 2C9.5 2 7.5 3.5 7 5.5 6.5 7.5 6 9 5 11s-1 4 0 6 2 4 3.5 5c.5.3 1 0 1-.5 0-1.5.5-3.5 1-5.5s1-3 1.5-3 1 1 1.5 3 1 4 1 5.5c0 .5.5.8 1 .5 1.5-1 2.5-3 3.5-5s1-4 0-6-1.5-3.5-2-5.5C16.5 3.5 14.5 2 12 2z"/></symbol>
</svg>

{% include '_topnav.html' %}

<main class="main">
  <h1 class="page-title">REDE UNNA / OdontoPrev</h1>
  <p class="page-subtitle" id="subtitle">Carregando…</p>

  <div class="stats-row" id="stats"></div>

  <div class="content-grid">
    <div class="card">
      <div class="card-header"><h2 class="card-title">GTOs <span id="gtos-count"></span></h2><input class="search" id="busca" placeholder="Buscar paciente ou GTO…"></div>
      <div id="gtos-list"></div>
    </div>
    <div class="card">
      <div class="card-header"><h2 class="card-title">Funil da Execução</h2></div>
      <div class="funnel" id="funnel"></div>
    </div>
  </div>
</main>

<script>
const $=id=>document.getElementById(id);
let ITENS=[];
function statusInfo(s){
  if(s==='ENVIADO'||s==='PRONTO'||s==='DRY_RUN')return['pill-green','av-green','#i-check'];
  if((s||'').startsWith('ERRO'))return['pill-red','av-red','#i-x'];
  if(s==='SEM_MATCH'||s==='AMBIGUO')return['pill-yellow','av-yellow','#i-warn'];
  if(s==='SEM_LAUDO'||s==='SEM_IMAGENS')return['pill-yellow','av-yellow','#i-warn'];
  return['pill-gray','av-gray','#i-tooth'];
}
function rank(s){return ({ERRO:0,ERRO_UPLOAD:0,SEM_MATCH:1,AMBIGUO:1,SEM_LAUDO:2,SEM_IMAGENS:2})[s]??9;}
function sc(cls,icon,val,label){return `<div class="stat-card"><div class="stat-icon ${cls}"><svg class="icon"><use href="${icon}"/></svg></div><div class="stat-value">${val}</div><div class="stat-label">${label}</div></div>`;}

async function carregar(){
  let j;try{j=await (await fetch('/api/gtos')).json();}catch(e){return;}
  const u=j.run;
  if(!u){$('subtitle').textContent='Nenhuma execução ainda. Rode "Executar Agora" no Dashboard.';$('stats').innerHTML='';$('funnel').innerHTML='<div class="empty">Sem dados.</div>';$('gtos-list').innerHTML='<div class="empty">Sem dados.</div>';return;}
  $('subtitle').textContent=`Dia ${u.dia} · ${u.alvos} GTOs em repasse`+(u.dry_run?' · (simulação)':'');
  $('stats').innerHTML=
    sc('gray','#i-doc',u.alvos,'GTOs alvo')+
    sc('green','#i-check',u.enviados,'Anexadas')+
    sc('blue','#i-send',u.solic_anexada,'Com solicitação')+
    sc('yellow','#i-warn',u.revisao_humana,'Revisão humana')+
    sc('purple','#i-warn',u.sem_match,'Sem match')+
    sc('red','#i-x',u.erros,'Erros');
  const base=u.alvos||1;
  $('funnel').innerHTML=
    fbar('GTOs alvo (repasse)',u.alvos,base,'fill-gray')+
    fbar('Anexadas',u.enviados,base,'fill-green')+
    fbar('Com solicitação anexada',u.solic_anexada,base,'fill-blue')+
    fbar('Revisão humana',u.revisao_humana,base,'fill-yellow')+
    fbar('Sem match no PRORADIS',u.sem_match,base,'fill-purple')+
    fbar('Erros',u.erros,base,'fill-red');
  ITENS=(u.itens||[]).slice().sort((a,b)=>rank(a.status)-rank(b.status));
  renderItens('');
}
function fbar(name,count,total,cls){const w=total>0?Math.max(2,Math.round(count/total*100)):0;return `<div class="funnel-item"><div class="funnel-label"><span class="funnel-name">${name}</span><span class="funnel-count">${count}</span></div><div class="funnel-bar"><div class="funnel-fill ${cls}" style="width:${w}%"></div></div></div>`;}
function renderItens(filtro){
  const f=(filtro||'').toLowerCase();
  const its=ITENS.filter(it=>!f||(it.paciente||'').toLowerCase().includes(f)||(it.gto||'').includes(f));
  $('gtos-count').textContent='· '+its.length;
  const el=$('gtos-list');
  if(!its.length){el.innerHTML='<div class="empty">Nenhuma GTO.</div>';return;}
  el.innerHTML=its.map(it=>{
    const[p,av,ic]=statusInfo(it.status);
    const sub=(it.enviados!=null)?`+${it.enviados} anexados · ${it.ja_anexados} já existiam`:'';
    const pend=it.revisao_humana?` · ${it.revisao_humana}`:(it.detalhe?` · ${it.detalhe}`:'');
    return `<div class="gto-item"><div class="gto-avatar ${av}"><svg class="icon"><use href="${ic}"/></svg></div><div class="gto-info"><div class="gto-name">${it.paciente||'(sem nome)'}</div><div class="gto-meta">GTO ${it.gto} · ${sub}${pend}</div></div><span class="status-pill ${p}">${it.status}</span></div>`;
  }).join('');
}
$('busca').addEventListener('input',e=>renderItens(e.target.value));
carregar();
</script>
</body>
</html>
