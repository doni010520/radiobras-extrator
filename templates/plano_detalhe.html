<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nome or slug }} — Detalhe</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--green-900:#064E3B;--green-700:#047857;--green-600:#059669;--green-500:#10B981;--green-100:#D1FAE5;
--gray-900:#111827;--gray-700:#374151;--gray-500:#6B7280;--gray-400:#9CA3AF;--gray-300:#D1D5DB;--gray-200:#E5E7EB;--gray-100:#F3F4F6;--gray-50:#F9FAFB;
--red-500:#EF4444;--red-100:#FEE2E2;--yellow-500:#F59E0B;--yellow-100:#FEF3C7;--blue-500:#3B82F6;--blue-100:#DBEAFE;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans Pro',-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;}
.icon{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.topnav{background:var(--green-900);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:fixed;top:0;left:0;right:0;z-index:100;}
.topnav-brand{display:flex;align-items:center;gap:12px;}
.topnav-logo{width:36px;height:36px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--green-900);font-weight:700;font-size:14px;}
.topnav-title{color:#fff;font-size:18px;font-weight:600;}
.topnav a{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;}
.main{margin-top:64px;padding:32px;max-width:1100px;margin-left:auto;margin-right:auto;}
.back{color:var(--green-700);text-decoration:none;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;}
.page-title{font-size:26px;font-weight:700;}
.page-sub{font-size:14px;color:var(--gray-500);margin-bottom:24px;}
.chips{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
.chip{background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:14px 18px;min-width:120px;}
.chip .n{font-size:24px;font-weight:700;line-height:1;}
.chip .l{font-size:12px;color:var(--gray-500);margin-top:5px;text-transform:uppercase;letter-spacing:.4px;}
.chip.anex .n{color:var(--green-600);}.chip.lau .n{color:var(--yellow-500);}.chip.err .n{color:var(--red-500);}.chip.sim .n{color:var(--blue-500);}
.daycard{background:#fff;border:1px solid var(--gray-200);border-radius:12px;margin-bottom:20px;overflow:hidden;}
.dayhead{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.dayhead .d{font-size:15px;font-weight:700;}
.dayhead .meta{font-size:12.5px;color:var(--gray-400);}
.dayhead a{font-size:13px;font-weight:600;color:var(--green-700);text-decoration:none;}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;}
.tag.sim{background:var(--yellow-100);color:#a86a00;}.tag.real{background:var(--green-100);color:var(--green-700);}
table{width:100%;border-collapse:collapse;}
th,td{text-align:left;padding:11px 20px;border-top:1px solid var(--gray-100);font-size:14px;vertical-align:top;}
th{font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;border-top:none;}
td.gto{color:var(--gray-500);font-variant-numeric:tabular-nums;white-space:nowrap;}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;white-space:nowrap;}
.badge.anex{background:var(--green-100);color:var(--green-700);}
.badge.sim{background:var(--blue-100);color:var(--blue-500);}
.badge.lau{background:var(--yellow-100);color:#a86a00;}
.badge.err{background:var(--red-100);color:var(--red-500);}
.badge.outros{background:var(--gray-100);color:var(--gray-500);}
.obs{color:var(--gray-600);font-size:13px;}
.empty{padding:40px;text-align:center;color:var(--gray-400);}
</style>
</head>
<body>
<svg style="display:none"><symbol id="i-arrow-l" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></symbol>
<symbol id="i-tooth" viewBox="0 0 24 24"><path d="M12 2C9.5 2 7.5 3.5 7 5.5 6.5 7.5 6 9 5 11s-1 4 0 6 2 4 3.5 5c.5.3 1 0 1-.5 0-1.5.5-3.5 1-5.5s1-3 1.5-3 1 1 1.5 3 1 4 1 5.5c0 .5.5.8 1 .5 1.5-1 2.5-3 3.5-5s1-4 0-6-1.5-3.5-2-5.5C16.5 3.5 14.5 2 12 2z"/></symbol></svg>

<nav class="topnav">
  <div class="topnav-brand"><div class="topnav-logo">RB</div><span class="topnav-title">RadioBras Digital</span></div>
  <a href="/"><svg class="icon"><use href="#i-arrow-l"/></svg> Dashboard</a>
</nav>

<main class="main">
  <a class="back" href="/"><svg class="icon"><use href="#i-arrow-l"/></svg> Voltar ao dashboard</a>
  <h1 class="page-title" id="title">{{ nome or slug }}</h1>
  <p class="page-sub" id="sub">Carregando…</p>
  <div class="chips" id="chips"></div>
  <div id="dias"><div class="empty">Carregando…</div></div>
</main>

<script>
const $=id=>document.getElementById(id);
const SLUG={{ slug|tojson }};
let DE={{ de|tojson }}, ATE={{ ate|tojson }};
const _pad=n=>String(n).padStart(2,'0');
const isoOf=d=>`${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
if(!DE||!ATE){const t=new Date();DE=isoOf(new Date(t.getFullYear(),t.getMonth(),1));ATE=isoOf(new Date(t.getFullYear(),t.getMonth()+1,0));}
function brOf(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
const LBL={anexadas:'Anexada',simulacao:'Simulação',sem_laudo:'Sem laudo',erros:'Erro/Sem match',outros:'—'};
const CLS={anexadas:'anex',simulacao:'sim',sem_laudo:'lau',erros:'err',outros:'outros'};
function fmtHora(iso){if(!iso)return'';try{return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}

async function carregar(){
  let j;try{j=await (await fetch(`/api/plano-detalhe?plano=${encodeURIComponent(SLUG)}&de=${DE}&ate=${ATE}`)).json();}catch(e){$('dias').innerHTML='<div class="empty">Falha ao carregar.</div>';return;}
  if(j.error){$('dias').innerHTML=`<div class="empty">${j.error}</div>`;return;}
  $('title').textContent=j.nome||SLUG;
  const t=j.totais||{};
  $('sub').textContent=`Período ${brOf(DE)} — ${brOf(ATE)} · ${t.total||0} GTO(s) processada(s)`;
  $('chips').innerHTML=
    `<div class="chip anex"><div class="n">${t.anexadas||0}</div><div class="l">Anexadas</div></div>`+
    `<div class="chip lau"><div class="n">${t.sem_laudo||0}</div><div class="l">Sem laudo</div></div>`+
    `<div class="chip err"><div class="n">${t.erros||0}</div><div class="l">Erro/Sem match</div></div>`+
    (t.simulacao?`<div class="chip sim"><div class="n">${t.simulacao}</div><div class="l">Simulação</div></div>`:'')+
    `<div class="chip"><div class="n">${t.revisao||0}</div><div class="l">Em revisão</div></div>`;
  const dias=j.dias||[];
  if(!dias.length){$('dias').innerHTML='<div class="empty">Nenhuma execução nesse período.</div>';return;}
  $('dias').innerHTML=dias.map(d=>{
    const rows=(d.itens||[]).map(it=>{
      const b=CLS[it.bucket]||'outros';
      const det=it.detalhe||'', rev=it.revisao_humana||'';
      return `<tr><td>${it.paciente||'—'}</td><td class="gto">${it.gto}</td>
        <td><span class="badge ${b}">${LBL[it.bucket]||it.status}</span></td>
        <td class="obs">${det}${rev?`<div style="color:#9CA3AF;font-size:12.5px">⚠ Revisão: ${rev}</div>`:''}</td></tr>`;
    }).join('');
    return `<div class="daycard">
      <div class="dayhead">
        <div><span class="d">Dia ${d.dia}</span> <span class="tag ${d.dry_run?'sim':'real'}">${d.dry_run?'SIMULAÇÃO':'REAL'}</span>
          <span class="meta">· ${fmtHora(d.finished_at)} · ${(d.itens||[]).length} GTO(s)</span></div>
        <a href="/relatorio/run/${d.run_id}" target="_blank">Ver relatório →</a>
      </div>
      <table><thead><tr><th>Paciente</th><th>GTO</th><th>Desfecho</th><th>Observação</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
}
carregar();
</script>
</body>
</html>
