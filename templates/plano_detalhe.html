<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ nome or slug }} — Detalhe</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
--green-900:#064E3B;--green-700:#047857;--green-600:#059669;--green-500:#10B981;--green-100:#D1FAE5;
--gray-900:#111827;--gray-700:#374151;--gray-500:#6B7280;--gray-400:#9CA3AF;--gray-300:#D1D5DB;--gray-200:#E5E7EB;--gray-100:#F3F4F6;--gray-50:#F9FAFB;
--red-500:#EF4444;--red-100:#FEE2E2;--yellow-500:#F59E0B;--yellow-100:#FEF3C7;--blue-500:#3B82F6;--blue-100:#DBEAFE;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Source Sans Pro',-apple-system,sans-serif;background:var(--gray-50);color:var(--gray-900);line-height:1.5;}
.icon{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.topnav{background:var(--green-900);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;position:fixed;top:0;left:0;right:0;z-index:100;}
.topnav-brand{display:flex;align-items:center;gap:12px;}
.topnav-logo{height:46px;display:flex;align-items:center;justify-content:center;}
.topnav-logo img{height:46px;width:auto;display:block;}
.topnav-title{color:#fff;font-size:18px;font-weight:600;}
.topnav a{color:rgba(255,255,255,.85);text-decoration:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;}
.main{margin-top:64px;padding:32px;max-width:1100px;margin-left:auto;margin-right:auto;}
.back{color:var(--green-700);text-decoration:none;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:6px;margin-bottom:14px;}
.page-title{font-size:26px;font-weight:700;}
.page-sub{font-size:14px;color:var(--gray-500);margin-bottom:24px;}
.chips{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}
.chip{background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:14px 18px;min-width:120px;}
.chip .n{font-size:24px;font-weight:700;line-height:1;}
.chip .l{font-size:12px;color:var(--gray-500);margin-top:5px;text-transform:uppercase;letter-spacing:.4px;}
.chip.anex .n{color:var(--green-600);}.chip.lau .n{color:var(--yellow-500);}.chip.err .n{color:var(--red-500);}.chip.sim .n{color:var(--blue-500);}
.chip.click{cursor:pointer;transition:.15s;}
.chip.click:hover{border-color:var(--green-500);transform:translateY(-2px);box-shadow:0 2px 10px rgba(6,78,59,.12);}
.chip.active{border-color:var(--green-600);box-shadow:0 0 0 2px var(--green-100);}
.filtrobar{font-size:13px;color:var(--gray-600);margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.clearf{font-size:12.5px;color:var(--green-700);cursor:pointer;background:none;border:none;text-decoration:underline;}
.daycard{background:#fff;border:1px solid var(--gray-200);border-radius:12px;margin-bottom:20px;overflow:hidden;}
.dayhead{padding:14px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.dayhead .d{font-size:15px;font-weight:700;}
.dayhead .meta{font-size:12.5px;color:var(--gray-400);}
.dayhead a{font-size:13px;font-weight:600;color:var(--green-700);text-decoration:none;}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;}
.tag.sim{background:var(--yellow-100);color:#a86a00;}.tag.real{background:var(--green-100);color:var(--green-700);}
table{width:100%;border-collapse:collapse;}
th,td{text-align:left;padding:11px 20px;border-top:1px solid var(--gray-100);font-size:14px;vertical-align:top;}
th{font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;border-top:none;}
td.gto{color:var(--gray-500);font-variant-numeric:tabular-nums;white-space:nowrap;}
.badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:100px;white-space:nowrap;}
.badge.anex{background:var(--green-100);color:var(--green-700);}
.badge.sim{background:var(--blue-100);color:var(--blue-500);}
.badge.lau{background:var(--yellow-100);color:#a86a00;}
.badge.err{background:var(--red-100);color:var(--red-500);}
.badge.outros{background:var(--gray-100);color:var(--gray-500);}
.obs{color:var(--gray-600);font-size:13px;}
.empty{padding:40px;text-align:center;color:var(--gray-400);}

/* Glosas & Recurso (seção embutida no detalhe do plano) */
.th-ish{font-size:11px;color:var(--gray-400);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.gcols{display:grid;grid-template-columns:1fr 1fr;gap:26px;}
@media(max-width:760px){.gcols{grid-template-columns:1fr;}}
.gurow{margin-bottom:11px;}
.gurow .t{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;}
.gstack{display:flex;height:13px;border-radius:7px;overflow:hidden;background:var(--gray-200);}
.gstack i{display:block;height:100%;}
.s-A_RECORRER{background:var(--yellow-500);}.s-RECURSO_OU_RESOLVIDA{background:var(--blue-500);}
.s-RECURSO_REJEITADO{background:#e07b39;}.s-RESOLVIDA{background:var(--green-500);}
.s-GLOSA_CONFIRMADA{background:var(--red-500);}
.s-NAO_RECURSAVEL{background:#b06b6b;}.s-GLOSADA{background:var(--gray-400);}
.gmrow{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;}
.gmrow .n{width:210px;color:var(--gray-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gmrow .bar{flex:1;height:8px;border-radius:5px;background:var(--gray-200);overflow:hidden;}
.gmrow .bar i{display:block;height:100%;background:var(--green-600);border-radius:5px;}
.gmrow .q{width:30px;text-align:right;font-weight:700;}
.glegend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--gray-500);margin-top:12px;}
.glegend span{display:inline-flex;align-items:center;gap:6px;}.glegend i{width:11px;height:11px;border-radius:3px;}
.dayhead .acts{display:flex;gap:16px;align-items:center;}

/* logomark / toggle / fab — ambos os temas */
.brand-glyph{fill:none;stroke:var(--green-700);stroke-width:1.8;}
.tt-accent{color:var(--green-700);font-weight:700;}
.theme-toggle{background:none;border:none;cursor:pointer;font-size:17px;line-height:1;padding:7px;border-radius:8px;color:inherit;transition:background .2s;}
.theme-toggle:hover{background:rgba(255,255,255,.14);}
.nav-right{display:flex;align-items:center;gap:8px;}
.fab{position:fixed;bottom:32px;right:32px;background:var(--green-700);color:#fff;text-decoration:none;padding:15px 22px;border-radius:100px;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:9px;box-shadow:0 6px 20px rgba(6,78,59,.3);transition:all .2s;z-index:90;}
.fab:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(6,78,59,.4);}
.fab svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;}

/* ===================== TEMA DARK (neon suave, escopado) ===================== */
[data-theme="dark"]{
  color-scheme:dark;
  --neon:#34C88E;
  --green-900:#06140e;--green-700:#2aa978;--green-600:#27b585;--green-500:#34C88E;--green-100:rgba(52,200,142,.12);
  --gray-50:#080c0b;--gray-100:#15201b;--gray-200:rgba(52,200,142,.10);--gray-300:rgba(52,200,142,.22);
  --gray-400:#728a81;--gray-500:#90a69d;--gray-600:#aec0b8;--gray-700:#c9d6cf;--gray-900:#e8f1ec;
  --red-500:#f1697a;--red-100:rgba(241,105,122,.14);--yellow-500:#e9c25f;--yellow-100:rgba(233,194,95,.14);
  --blue-500:#5fb0f0;--blue-100:rgba(95,176,240,.14);
}
[data-theme="dark"] body{background:radial-gradient(900px 500px at 85% -8%,rgba(52,200,142,.04),transparent 60%),var(--gray-50);color:var(--gray-900);}
[data-theme="dark"] .topnav{background:rgba(6,18,12,.85);backdrop-filter:blur(10px);border-bottom:1px solid rgba(52,200,142,.16);box-shadow:0 4px 18px rgba(0,0,0,.4);}
[data-theme="dark"] .topnav-logo{filter:drop-shadow(0 0 6px rgba(52,200,142,.25));}
[data-theme="dark"] .brand-glyph{stroke:var(--neon);filter:drop-shadow(0 0 3px rgba(52,200,142,.4));}
[data-theme="dark"] .tt-accent{color:var(--neon);}
[data-theme="dark"] .chip,[data-theme="dark"] .daycard{background:var(--green-900);border-color:rgba(52,200,142,.12);transition:border-color .2s,box-shadow .2s;}
[data-theme="dark"] .daycard:hover{border-color:rgba(52,200,142,.26);box-shadow:0 0 12px rgba(52,200,142,.12);}
[data-theme="dark"] .badge.anex{background:rgba(52,200,142,.14);color:var(--neon);}
[data-theme="dark"] .fab{box-shadow:0 0 16px rgba(52,200,142,.3);}[data-theme="dark"] .fab:hover{box-shadow:0 0 24px rgba(52,200,142,.45);}
[data-theme="dark"] .theme-toggle:hover{background:rgba(52,200,142,.12);}
[data-theme="dark"] ::selection{background:rgba(52,200,142,.25);}
[data-theme="dark"] ::-webkit-scrollbar{width:10px;}[data-theme="dark"] ::-webkit-scrollbar-thumb{background:rgba(52,200,142,.2);border-radius:6px;}
</style>
<script>(function(){try{var t=localStorage.getItem('rb-theme')||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
</head>
<body>
<svg style="display:none"><symbol id="i-arrow-l" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></symbol>
<symbol id="i-tooth" viewBox="0 0 24 24"><path d="M12 2C9.5 2 7.5 3.5 7 5.5 6.5 7.5 6 9 5 11s-1 4 0 6 2 4 3.5 5c.5.3 1 0 1-.5 0-1.5.5-3.5 1-5.5s1-3 1.5-3 1 1 1.5 3 1 4 1 5.5c0 .5.5.8 1 .5 1.5-1 2.5-3 3.5-5s1-4 0-6-1.5-3.5-2-5.5C16.5 3.5 14.5 2 12 2z"/></symbol></svg>

<nav class="topnav">
  <div class="topnav-brand"><div class="topnav-logo"><img src="/static/mascote.png" alt="RadioBras Digital"></div><span class="topnav-title">RadioBras<span class="tt-accent"> Digital</span></span></div>
  <div class="nav-right"><button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Alternar tema">🌙</button><a href="/"><svg class="icon"><use href="#i-arrow-l"/></svg> Dashboard</a></div>
</nav>

<main class="main">
  <a class="back" href="/"><svg class="icon"><use href="#i-arrow-l"/></svg> Voltar ao dashboard</a>
  <h1 class="page-title" id="title">{{ nome or slug }}</h1>
  <p class="page-sub" id="sub">Carregando…</p>
  <div class="chips" id="chips"></div>

  <div id="glosaSec" style="display:none;margin-bottom:24px">
    <div class="daycard">
      <div class="dayhead">
        <div><span class="d">🩹 Glosas &amp; Recurso</span> <span class="meta" id="glosaSub"></span></div>
        <div class="acts">
          <a id="glosaXlsx" href="/glosas.xlsx">⬇ Excel</a>
          <a id="glosaPdf" href="/glosas.pdf">⬇ PDF</a>
          <a href="/glosas">Ver panorama →</a>
        </div>
      </div>
      <div style="padding:16px 20px">
        <div class="chips" id="glosaChips" style="margin-bottom:18px"></div>
        <div class="gcols">
          <div><div class="th-ish">Por unidade</div><div id="glosaUnid"></div></div>
          <div><div class="th-ish">Por motivo de glosa</div><div id="glosaMot"></div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="dias"><div class="empty">Carregando…</div></div>
</main>

<a class="fab" href="/?run={{ slug }}"><svg viewBox="0 0 24 24"><path d="M5 3l14 9-14 9V3z"/></svg> Executar Agora</a>

<script>
const $=id=>document.getElementById(id);
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('rb-theme',t);}catch(e){}var b=$('themeBtn');if(b)b.textContent=(t==='dark'?'☀️':'🌙');}
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')||'dark';applyTheme(c==='dark'?'light':'dark');}
applyTheme(document.documentElement.getAttribute('data-theme')||'dark');
const SLUG={{ slug|tojson }};
let DE={{ de|tojson }}, ATE={{ ate|tojson }};
const _pad=n=>String(n).padStart(2,'0');
const isoOf=d=>`${d.getFullYear()}-${_pad(d.getMonth()+1)}-${_pad(d.getDate())}`;
if(!DE||!ATE){const t=new Date();DE=isoOf(new Date(t.getFullYear(),t.getMonth(),1));ATE=isoOf(new Date(t.getFullYear(),t.getMonth()+1,0));}
function brOf(iso){if(!iso)return'';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;}
const LBL={anexadas:'Anexada',simulacao:'Simulação',sem_laudo:'Sem laudo',erros:'Erro/Sem match',outros:'—'};
const CLS={anexadas:'anex',simulacao:'sim',sem_laudo:'lau',erros:'err',outros:'outros'};
const CHIP_DEFS=[{k:'anexadas',cls:'anex',lbl:'Anexadas'},{k:'sem_laudo',cls:'lau',lbl:'Sem laudo'},
  {k:'erros',cls:'err',lbl:'Erro/Sem match'},{k:'simulacao',cls:'sim',lbl:'Simulação'},{k:'revisao',cls:'',lbl:'Em revisão'}];
const SMETA={SEM_MATCH:'Paciente não localizado no PRORADIS',AMBIGUO:'Nome ambíguo — precisa conferência',
  ERRO_UPLOAD:'Falha no envio do anexo',ERRO:'Erro no processamento',
  SEM_LAUDO:'Exame ainda não laudado no PRORADIS',SEM_IMAGENS:'Sem imagens disponíveis no PRORADIS'};
let DADOS=null, gtoFilter='';
function fmtHora(iso){if(!iso)return'';try{return new Date(iso).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}catch(e){return'';}}

async function carregar(){
  let j;try{j=await (await fetch(`/api/plano-detalhe?plano=${encodeURIComponent(SLUG)}&de=${DE}&ate=${ATE}`)).json();}catch(e){$('dias').innerHTML='<div class="empty">Falha ao carregar.</div>';return;}
  if(j.error){$('dias').innerHTML=`<div class="empty">${j.error}</div>`;return;}
  $('title').textContent=j.nome||SLUG;
  const t=j.totais||{};
  $('sub').textContent=`Período ${brOf(DE)} — ${brOf(ATE)} · ${t.total||0} GTO(s) processada(s)`;
  DADOS=j;
  renderChips();
  if(!(j.dias||[]).length){$('dias').innerHTML='<div class="empty">Nenhuma execução nesse período.</div>';return;}
  renderDias();
}

function renderChips(){
  const t=DADOS.totais||{};
  $('chips').innerHTML=CHIP_DEFS.map(c=>{
    if(c.k==='simulacao'&&!t.simulacao)return'';
    const act=gtoFilter===c.k?' active':'';
    return `<div class="chip click ${c.cls}${act}" data-k="${c.k}" onclick="setBucket('${c.k}')" title="Ver as GTOs ${c.lbl}">
      <div class="n">${t[c.k]||0}</div><div class="l">${c.lbl}</div></div>`;
  }).join('');
}
function itemMatch(it){
  if(!gtoFilter)return true;
  if(gtoFilter==='revisao')return !!(it.revisao_humana&&it.revisao_humana.trim());
  return it.bucket===gtoFilter;
}
function renderDias(){
  let total=0;
  const html=(DADOS.dias||[]).map(d=>{
    const its=(d.itens||[]).filter(itemMatch); total+=its.length;
    if(!its.length)return'';
    const rows=its.map(it=>{
      const b=CLS[it.bucket]||'outros';
      const det=it.detalhe||SMETA[it.status]||'', rev=it.revisao_humana||'';
      return `<tr><td>${it.paciente||'—'}</td><td class="gto">${it.gto}</td>
        <td><span class="badge ${b}">${LBL[it.bucket]||it.status}</span></td>
        <td class="obs">${det||'—'}${rev?`<div style="color:var(--gray-400);font-size:12.5px">⚠ Revisão: ${rev}</div>`:''}</td></tr>`;
    }).join('');
    return `<div class="daycard">
      <div class="dayhead">
        <div><span class="d">Dia ${d.dia}</span> <span class="tag ${d.dry_run?'sim':'real'}">${d.dry_run?'SIMULAÇÃO':'REAL'}</span>
          <span class="meta">· ${fmtHora(d.finished_at)} · ${its.length} GTO(s)</span></div>
        <a href="/relatorio/run/${d.run_id}" target="_blank">Ver relatório →</a>
      </div>
      <table><thead><tr><th>Paciente</th><th>GTO</th><th>Desfecho</th><th>Observação</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
  }).join('');
  const def=CHIP_DEFS.find(c=>c.k===gtoFilter);
  const bar=gtoFilter?`<div class="filtrobar">Mostrando: <b>${def?def.lbl:gtoFilter}</b> · ${total} GTO(s)
      <button class="clearf" onclick="setBucket('')">ver todas</button></div>`:'';
  $('dias').innerHTML=bar+(html||'<div class="empty">Nenhuma GTO nesse filtro.</div>');
}
function setBucket(k){
  gtoFilter=(gtoFilter===k)?'':k;
  renderChips(); renderDias();
  $('dias').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Glosas & Recurso (panorama embutido) ─────────────────────────────────────
let GSIT=['A_RECORRER','RECURSO_OU_RESOLVIDA','RECURSO_REJEITADO','RESOLVIDA','GLOSA_CONFIRMADA','NAO_RECURSAVEL','GLOSADA'];
const GCL={A_RECORRER:'lau',RECURSO_OU_RESOLVIDA:'sim',RECURSO_REJEITADO:'err',RESOLVIDA:'anex',GLOSA_CONFIRMADA:'err',NAO_RECURSAVEL:'err',GLOSADA:'outros'};
async function carregarGlosas(){
  let j;try{j=await (await fetch('/api/glosas')).json();}catch(e){return;}
  if(!j||!j.total)return;                       // sem glosas p/ esse plano: não mostra
  const meta=j.meta||{};
  if(j.situacoes&&j.situacoes.length)GSIT=j.situacoes.map(s=>s[0]);
  $('glosaSec').style.display='';
  const cap=j.lotes&&j.lotes[0]?j.lotes[0].captured_at:null;
  $('glosaSub').textContent=`· ${j.total} glosas · período até ${j.dia}`+(cap?` · atualizado ${new Date(cap).toLocaleString('pt-BR')}`:'');
  const s=j.por_situacao||{};
  $('glosaChips').innerHTML=`<div class="chip"><div class="n">${j.total}</div><div class="l">Total glosas</div></div>`+
    GSIT.map(k=>{const c=GCL[k];const cls=['anex','lau','err','sim'].includes(c)?(' '+c):'';
      return `<a class="chip${cls}" href="/glosas?sit=${k}" style="cursor:pointer;text-decoration:none;color:inherit;display:block"
        title="Ver as GTOs com status ${(meta[k]||{}).label||k}">
        <div class="n">${s[k]||0}</div><div class="l">${(meta[k]||{}).label||k}</div></a>`;}).join('');
  $('glosaUnid').innerHTML=(j.por_unidade||[]).map(u=>{
    const segs=GSIT.map(k=>{const v=u[k]||0;if(!v)return'';
      return `<i class="s-${k}" style="width:${(v/u.total*100).toFixed(1)}%" title="${(meta[k]||{}).label||k}: ${v}"></i>`;}).join('');
    return `<div class="gurow"><div class="t"><b>${u.unidade}</b><span>${u.total}</span></div><div class="gstack">${segs}</div></div>`;
  }).join('')+`<div class="glegend">${GSIT.map(k=>`<span><i class="s-${k}"></i>${(meta[k]||{}).label||k}</span>`).join('')}</div>`;
  const ms=j.por_motivo||[],max=Math.max(1,...ms.map(m=>m.total));
  $('glosaMot').innerHTML=ms.slice(0,8).map(m=>`<div class="gmrow">
      <span class="n" title="${m.glosa_cod} — ${m.glosa_motivo}">${m.glosa_cod} · ${m.glosa_motivo}</span>
      <span class="bar"><i style="width:${(m.total/max*100).toFixed(0)}%"></i></span>
      <span class="q">${m.total}</span></div>`).join('');
}

carregar();
carregarGlosas();
</script>
</body>
</html>
