<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Entrar — RadioBras Digital</title>
{% include '_head.html' %}
<style>
  body{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;
       background:radial-gradient(1100px 560px at 50% -8%, #15402c 0%, #0a1610 60%)}
  .login{width:100%;max-width:380px;background:var(--rb-surface);border-radius:var(--rb-r-lg);
         padding:34px 30px;box-shadow:0 28px 80px rgba(0,0,0,.45);border:1px solid var(--rb-border)}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:4px}
  .brand .logo{width:44px;height:44px;border-radius:12px;background:var(--rb-primary);color:#fff;
       display:grid;place-items:center}
  .brand .logo svg{width:24px;height:24px;stroke:#fff;fill:none;stroke-width:2}
  .brand b{font-size:19px;color:var(--rb-fg)} .brand b span{color:var(--rb-primary)}
  .sub{text-align:center;color:var(--rb-fg-muted);font-size:14px;margin:2px 0 22px}
  .foot{text-align:center;color:var(--rb-fg-subtle);font-size:12px;margin-top:18px}
</style>
</head>
<body>
  <form class="login" method="post" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
    <div class="brand">
      <span class="logo"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 0-4 4c0 1.5-3 1-3 5 0 3 2 4 3 7 .5 1.5 1 4 4 4s3.5-2.5 4-4c1-3 3-4 3-7 0-4-3-3.5-3-5a4 4 0 0 0-4-4z"/></svg></span>
      <b>RadioBras <span>Digital</span></b>
    </div>
    <div class="sub">Faça login para continuar</div>
    {% if erro %}<div class="rb-alert rb-alert--danger" role="alert" style="margin-bottom:8px;text-align:center">{{ erro }}</div>{% endif %}
    <label class="rb-label" for="usuario">Usuário</label>
    <input class="rb-input" id="usuario" name="usuario" autocomplete="username" autofocus required>
    <div style="height:14px"></div>
    <label class="rb-label" for="senha">Senha</label>
    <input class="rb-input" id="senha" name="senha" type="password" autocomplete="current-password" required>
    <button class="rb-btn rb-btn--primary rb-btn--block" type="submit" style="margin-top:22px">Entrar</button>
    <div class="foot">Acesso restrito · RadioBras Digital</div>
  </form>
</body>
</html>
